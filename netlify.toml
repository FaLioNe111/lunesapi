# Конфигурация Netlify

[build]
  command = "npm run build"
  publish = "dist"

# SPA: маршрутизация на клиенте (react-router).
# Без этого правила прямое открытие /stars, /profile, /gift/... даёт 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Картинки звёзд и прочие ассеты с хешем в имени можно кэшировать надолго
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
